<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Report</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body class="edit-report-page">

<header class="topbar">
  <div class="container topbar-inner">

    <div class="brand">
      <a href="main.html"><img src="images/logo.png"></a>
      <span class="brand-text"><a href="main.html">Rasheed</a></span>
    </div>

    <nav class="nav-links">
      <a href="AddReport.html" class="nav-link">
        <i class="fa-regular fa-file-lines"></i> Add Report
      </a>

      <a href="MyReports.html" class="nav-link active">
        <i class="fa-regular fa-clipboard"></i> My Reports
      </a>

      <a href="rewards.html" class="nav-link">
        <i class="fa-regular fa-star"></i> Rewards
      </a>

      <a href="Notifications.html" class="nav-link">
        <i class="fa-regular fa-bell"></i> Notifications
      </a>

      <a href="index.html" class="nav-link logout">
        <i class="fa-solid fa-right-from-bracket"></i> Log Out
      </a>
    </nav>

  </div>
</header>

<div class="edit-report-wrapper">

  <h1 class="page-title">Edit Report</h1>

  <a href="report-det2.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Back
  </a>

  <div class="edit-report-card">

    <!-- HEADER -->
    <div class="edit-report-header">
      <div class="edit-report-icon2">
        <i class="fa-solid fa-bolt"></i> 
      </div>

      <div>
        <h1 class="edit-report-id">RPT-02</h1>
        <p class="edit-report-type">Power Issue</p>
      </div>
    </div>

    <form id="editReportForm">

      <!-- DESCRIPTION -->
      <h3 class="edit-section-title">Edit Description</h3>
      <textarea id="description">Power outage in building</textarea>

      <!-- LOCATION -->
      <h3 class="edit-section-title">Edit Location</h3>
      <div class="edit-location-grid">

        <div class="edit-field">
          <label>City</label>
          <input type="text" value="Jeddah">
        </div>

        <div class="edit-field">
          <label>Neighborhood</label>
          <input type="text" value="Al Rawdah">
        </div>

        <div class="edit-field">
          <label>Street</label>
          <input type="text" value="Street 8">
        </div>

        <div class="edit-field">
          <label>Building</label>
          <input type="text" value="15">
        </div>

      </div>

      <!-- SEVERITY -->
      <h3 class="edit-section-title">Severity Level</h3>
      <div class="edit-severity-row">
        <button type="button" class="edit-severity-btn">Low</button>
        <button type="button" class="edit-severity-btn">Medium</button>
        <button type="button" class="edit-severity-btn active">High</button>
      </div>

      <!-- PHOTO -->
      <h3 class="edit-section-title">Update Photo</h3>

      <div class="edit-upload-box" id="uploadBox">

        <!-- الصورة الحالية -->
        <div class="edit-current-photo">
          <img id="currentPhoto" src="images/report-det2.jpg">
        </div>

        <i class="fa-solid fa-cloud-arrow-up"></i>
        <div id="uploadMain">Click to upload a new image</div>
        <div>PNG, JPG up to 5MB</div>

        <input type="file" id="photoInput" accept=".png,.jpg,.jpeg" hidden>
      </div>

      <!-- ACTIONS -->
      <div class="edit-actions">
        <button type="submit" class="save-btn">
          <i class="fa-solid fa-floppy-disk"></i> Save Changes
        </button>

        <a href="report-det2.html" class="cancel-btn">Cancel</a>
      </div>

      <p id="successMessage" class="edit-success-message"></p>

    </form>

  </div>
</div>

<script>

const uploadBox = document.getElementById("uploadBox");
const photoInput = document.getElementById("photoInput");
const uploadMain = document.getElementById("uploadMain");
const currentPhoto = document.getElementById("currentPhoto");
const successMessage = document.getElementById("successMessage");

uploadBox.addEventListener("click", () => {
  photoInput.click();
});

photoInput.addEventListener("change", () => {
  if (photoInput.files.length > 0) {
    const file = photoInput.files[0];

    uploadMain.textContent = file.name;

    const reader = new FileReader();
    reader.onload = function(e) {
      currentPhoto.src = e.target.result;
    };

    reader.readAsDataURL(file);
  }
});

const severityButtons = document.querySelectorAll(".edit-severity-btn");

severityButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    severityButtons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
});

document.getElementById("editReportForm").addEventListener("submit", function(e) {
  e.preventDefault();

  successMessage.textContent = "Report updated successfully!";

  setTimeout(() => {
    window.location.href = "MyReports.html";
  }, 600);
});

</script>

</body>
</html>
